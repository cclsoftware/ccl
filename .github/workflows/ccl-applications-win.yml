name: CCL Tools for Windows

concurrency:
  group: ccl-applications-win
  
on: 
  workflow_call:
    inputs:
      buildDemo:
        description: 'Build CCL Demo'
        type: boolean
        required: true
        default: true
      buildLocalizer:
        description: 'Build CCL Localizer'
        type: boolean
        required: true
        default: true
      buildSkinEditor:
        description: 'Build CCL Skin Editor'
        type: boolean
        required: true
        default: true
  
jobs:
  build:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-2025
            image: ccl-win-base:latest
            targetos: win
            preset: win64

          - host: windows-2025
            image: ccl-win-base:latest
            targetos: win-arm64
            preset: win-arm64
            
    runs-on: ${{ matrix.host }}
    
    permissions:
      contents: read
      packages: read
      
    steps:
    
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
  
      - name: Prepare build environment
        uses: ./.github/ci/win/prepare-build-environment
        with:
          image: ${{ matrix.image }}
          targetos: ${{ matrix.targetos }}
          token: ${{ secrets.GITHUB_TOKEN }}
    
      - name: Build CCL Demo in container
        if: inputs.buildDemo
        uses: ./.github/ci/win/build-cmake-target
        with:
          image: ${{ matrix.image }}
          signkeyvault: ${{ secrets.SIGNING_AZURE_KEYVAULT_WIN }}
          signclientid: ${{ secrets.SIGNING_AZURE_CLIENTID_WIN }}
          signtenantid: ${{ secrets.SIGNING_AZURE_TENANTID_WIN }}
          signcert: ${{ secrets.SIGNING_CERTIFICATE_WIN }}
          signserver: ${{ vars.SIGNING_TIMESTAMP_SERVER_WIN }}
          signsecret: ${{ secrets.SIGNING_AZURE_SECRET_WIN }}
          dockerargs: |
            -e BUILD_REVISION="${{ github.run_number }}" \
            -e BUILD_DIR="build/ccldemo" \
            -e CMAKE_BUILD_OPTIONS="-DBUILD_ccldemo=ON" \
            -e CMAKE_PRESET="${{ matrix.preset }}" \
            -e CPACK_TARGET="ccldemo_installer" \
       
      - name: Build CCL Localizer in container
        if: inputs.buildLocalizer
        uses: ./.github/ci/win/build-cmake-target
        with:
          image: ${{ matrix.image }}
          signkeyvault: ${{ secrets.SIGNING_AZURE_KEYVAULT_WIN }}
          signclientid: ${{ secrets.SIGNING_AZURE_CLIENTID_WIN }}
          signtenantid: ${{ secrets.SIGNING_AZURE_TENANTID_WIN }}
          signcert: ${{ secrets.SIGNING_CERTIFICATE_WIN }}
          signserver: ${{ vars.SIGNING_TIMESTAMP_SERVER_WIN }}
          signsecret: ${{ secrets.SIGNING_AZURE_SECRET_WIN }}
          dockerargs: |
            -e BUILD_REVISION="${{ github.run_number }}" \
            -e BUILD_DIR="build/ccldemo" \
            -e CMAKE_BUILD_OPTIONS="-DBUILD_localizer=ON" \
            -e CMAKE_PRESET="${{ matrix.preset }}" \
            -e CPACK_TARGET="localizerapp_installer" \
       
      - name: Build CCL Skin Editor in container
        if: inputs.buildSkinEditor
        uses: ./.github/ci/win/build-cmake-target
        with:
          image: ${{ matrix.image }}
          signkeyvault: ${{ secrets.SIGNING_AZURE_KEYVAULT_WIN }}
          signclientid: ${{ secrets.SIGNING_AZURE_CLIENTID_WIN }}
          signtenantid: ${{ secrets.SIGNING_AZURE_TENANTID_WIN }}
          signcert: ${{ secrets.SIGNING_CERTIFICATE_WIN }}
          signserver: ${{ vars.SIGNING_TIMESTAMP_SERVER_WIN }}
          signsecret: ${{ secrets.SIGNING_AZURE_SECRET_WIN }}
          dockerargs: |
            -e BUILD_REVISION="${{ github.run_number }}" \
            -e BUILD_DIR="build/ccldemo" \
            -e CMAKE_BUILD_OPTIONS="-DBUILD_skineditor=ON" \
            -e CMAKE_PRESET="${{ matrix.preset }}" \
            -e CPACK_TARGET="skineditor_installer" \
       
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ccl-applications-${{matrix.targetos}}
          path: |
            applications/**/packaging/win/nsis/*.exe
